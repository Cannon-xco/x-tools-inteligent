services:
  postgres:
    image: postgres:16-alpine
    container_name: xtools-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: xtools
      POSTGRES_USER: xtools
      POSTGRES_PASSWORD: xtools_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xtools -d xtools"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-test:
    image: postgres:16-alpine
    container_name: xtools-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_DB: xtools_test
      POSTGRES_USER: xtools_test
      POSTGRES_PASSWORD: xtools_test_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xtools_test -d xtools_test"]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:
  postgres_test_data:
